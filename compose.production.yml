services:
  postgres:
    image: postgres:16
    container_name: multi_cooperation_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multi_cooperation}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-multi_cooperation}"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: multi_cooperation_server_prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      SERVER_PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-multi_cooperation}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_ADVANCED_BASE_URL: ${OPENAI_ADVANCED_BASE_URL:-}
      OPENAI_ADVANCED_API_KEY: ${OPENAI_ADVANCED_API_KEY:-}
      OPENAI_ADVANCED_MODEL: ${OPENAI_ADVANCED_MODEL:-}
      CASE_LIBRARY_ROOT: ${CASE_LIBRARY_ROOT:-/app/00_start_materials/原始材料}
      STORAGE_ROOT: ${STORAGE_ROOT:-/app/storage}
    volumes:
      - server_storage:/app/storage
      - ./00_start_materials:/app/00_start_materials:ro
    ports:
      - "${SERVER_PUBLIC_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_SERVER_BASE_URL: ${NEXT_PUBLIC_SERVER_BASE_URL:-http://49.233.203.108:3001}
    container_name: multi_cooperation_web_prod
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SERVER_BASE_URL: ${NEXT_PUBLIC_SERVER_BASE_URL:-http://49.233.203.108:3001}
    ports:
      - "${WEB_PUBLIC_PORT:-3000}:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: multi_cooperation_nginx_prod
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
      server:
        condition: service_healthy
    ports:
      - "${HTTP_PUBLIC_PORT:-80}:80"
      - "${HTTPS_PUBLIC_PORT:-443}:443"
    volumes:
      - ./infra/nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ${NGINX_CERT_DIR:-/etc/multi-cooperation/certs}:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  server_storage:
