server {
  listen 80;
  server_name aiseek.tech www.aiseek.tech;

  location = /healthz {
    access_log off;
    return 200 "ok\n";
  }

  location / {
    return 301 https://aiseek.tech$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name www.aiseek.tech;

  ssl_certificate /etc/nginx/certs/aiseek.tech_bundle.crt;
  ssl_certificate_key /etc/nginx/certs/aiseek.tech.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  location = /healthz {
    access_log off;
    return 200 "ok\n";
  }

  location / {
    return 301 https://aiseek.tech$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name aiseek.tech;

  ssl_certificate /etc/nginx/certs/aiseek.tech_bundle.crt;
  ssl_certificate_key /etc/nginx/certs/aiseek.tech.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 50m;

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_http_version 1.1;

  location = /healthz {
    access_log off;
    return 200 "ok\n";
  }

  location = /api/health {
    proxy_pass http://server:3001/health;
  }

  location /api/experiment/session/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
    proxy_pass http://server:3001;
  }

  location /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://server:3001;
  }

  location / {
    proxy_pass http://web:3000;
  }
}
